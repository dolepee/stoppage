services:
  stoppage:
    build: .
    restart: unless-stopped
    ports:
      - "4173:4173"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4173/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
