name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.34.4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm sdk:consumer:verify
      - run: pnpm gate:verify
      - run: pnpm reopen:verify
      - name: Verify the runtime container serves approved public evidence
        run: |
          docker build --tag stoppage:ci .
          container_id="$(docker run --detach --publish 4173:4173 stoppage:ci)"
          cleanup() {
            docker rm --force "$container_id" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4173/api/health >/dev/null; then
              break
            fi
            sleep 1
          done
          expected_hash="$(jq -r .candidateHash data/public/live-decision-tape.json)"
          actual_hash="$(curl --fail --silent http://127.0.0.1:4173/api/live-decision-tape | jq -r .candidateHash)"
          test "$actual_hash" = "$expected_hash"
          curl --fail --silent http://127.0.0.1:4173/api/public-claim >/dev/null
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm browser:smoke
